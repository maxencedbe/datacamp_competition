version: 2
title: Diabetic Retinopathy Detection
description: Multilabel classification of retinal images into 5 severity levels.
image: logo.png
registration_auto_approve: True

terms: pages/overview.md
pages:
  - title: Overview
    file: pages/overview.md

tasks:
  - index: 0
    name: Development task
    description: 'Classification of retinal images into 5 severity levels of diabetic retinopathy.'
    input_data: dev_phase/input_data/
    reference_data: dev_phase/reference_data/
    ingestion_program: ingestion_program/
    scoring_program: scoring_program/

solutions:
  - index: 0
    tasks:
      - 0
    path: solution/

phases:
  - name: Development phase
    description: 'Development phase: tune your models and submit.'
    start: 03-01-2026
    end: 05-31-2026
    max_submissions_per_day: 10
    max_submissions: 100
    tasks:
      - 0

leaderboards:
  - title: Results
    key: main
    columns:
      - title: F1 Macro
        key: f1_macro
        index: 0
        sorting: desc
      - title: F1 Micro
        key: f1_micro
        index: 1
        sorting: desc
      - title: Hamming Loss
        key: hamming_loss
        index: 2
        sorting: asc
      - title: Runtime (s)
        key: runtime
        index: 3
        sorting: asc